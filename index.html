<meta charset="UTF-8">
<!--
  Root-anchored base. Without this, SPA fallback for nested paths like
  /install/<token> would make the relative <script src="security.jsx">
  resolve to /install/<token>/security.jsx — the server then serves
  index.html for that unknown path (200 OK, text/html), Babel tries to
  compile HTML as JSX, and the page renders completely blank with no
  obvious error. <base href="/"> forces every relative URL (scripts,
  manifest, icons, SW register call) to resolve from the origin root.
-->
<base href="/">
<title>แอป หน้าบ้าน & หลังบ้าน</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!--
  ─────────────────────────────────────────────────────────────
  SECURITY HEADERS (defense in depth — duplicated by server)
  ─────────────────────────────────────────────────────────────
  CSP script-src needs 'unsafe-inline' because Babel Standalone
  compiles type="text/babel" at runtime. Production build should
  pre-compile JSX and drop 'unsafe-inline'.
-->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://unpkg.com 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https:; object-src 'none'; base-uri 'none'; frame-ancestors 'self'; form-action 'self'; upgrade-insecure-requests">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#1F1B17">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MyApp">

  html, body {

  .view { animation: viewIn 520ms cubic-bezier(0.16, 0.84, 0.44, 1) both; }

  }
  .ua-enter { animation: uaIn 560ms cubic-bezier(0.2, 0.8, 0.3, 1) both; }
  @keyframes uaIn {

  }
  .ua-tile:hover { transform: translateY(-2px); }
  .ad-tab { animation: adTab 340ms cubic-bezier(0.2, 0.8, 0.3, 1) both; }
  @keyframes adTab {

  }

  /* ── First-launch splash animation ─────────────────────────
     Shown only on the truly-first app open on a device (no
     public_cache_v1 yet). Three layered animations for a premium
     feel: morphing conic gradient backdrop, icon that pops in with

  .splash-root {

    animation-play-state: paused;
  }
  .splash-root.splash-exit { animation-play-state: running; }
  @keyframes splashFadeOut {

  }
  .splash-bg {
    position: absolute; inset: -40%;
    background: conic-gradient(from 0deg,
      #C48B3E, #B4463A, #7A5A10, #C48B3E);
    filter: blur(80px); opacity: 0.55;
    animation: splashSwirl 9s linear infinite;
  }
  @keyframes splashSwirl {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  .splash-icon {
    position: relative;

    animation: splashIconIn 700ms cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  @keyframes splashIconIn {
    from { opacity: 0; transform: scale(0.4) rotate(-12deg); }
    to   { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  .splash-icon::before {

    position: absolute; inset: -12px; border-radius: 32px;
    border: 2px solid rgba(255,255,255,0.3);
    animation: splashHalo 1.8s ease-out infinite;
  }
  @keyframes splashHalo {

  }
  .splash-dots {

  }
  .splash-dots span {

  @keyframes splashDot {

  }
  .caption {
    font-size: 11px; letter-spacing: 1.2px; text-transform: uppercase;

  .tweaks {

  .tweaks select, .tweaks input[type=range] {

    margin-bottom: 10px;

</style>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

// ── Error boundary around the whole app ──
class ErrorBoundary extends React.Component {
  constructor(p) { super(p); this.state = { err: null }; }
  static getDerivedStateFromError(err) { return { err }; }
  componentDidCatch(err, info) { console.error('App crashed:', err, info); }
  render() {
    if (!this.state.err) return this.props.children;
    return (
      <div style={{ padding: 40, maxWidth: 560, margin: '60px auto', background: '#fff', borderRadius: 14, boxShadow: '0 20px 60px -20px rgba(0,0,0,0.15)' }}>
        <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 10 }}>เกิดข้อผิดพลาดในหน้า</div>
        <div style={{ fontSize: 13, color: '#6B6458', marginBottom: 14 }}>ลองรีโหลดหน้า · ถ้ายังไม่หายส่งข้อความนี้ให้ทีมพัฒนา</div>
        <pre style={{ fontSize: 11, background: '#F3EFE7', padding: 12, borderRadius: 8, overflow: 'auto' }}>{String(this.state.err?.message || this.state.err)}</pre>
        <button onClick={() => location.reload()} style={{ marginTop: 14, padding: '9px 18px', borderRadius: 8, border: 'none', background: '#1F1B17', color: '#fff', fontFamily: 'inherit', cursor: 'pointer' }}>รีโหลด</button>
      </div>
    );
  }
}

// Idle auto-logout hook. Calls onTimeout after N ms of no user activity.
function useIdleLogout(onTimeout, timeoutMs = 30 * 60_000, active = true) {
  useEffect(() => {
    if (!active) return;
    let t;
    const reset = () => { clearTimeout(t); t = setTimeout(onTimeout, timeoutMs); };
    const events = ['mousedown', 'keydown', 'touchstart', 'scroll', 'visibilitychange'];
    events.forEach(e => window.addEventListener(e, reset, { passive: true }));
    reset();
    return () => { clearTimeout(t); events.forEach(e => window.removeEventListener(e, reset)); };
  }, [onTimeout, timeoutMs, active]);
}

function App({ adminUnlocked = false } = {}) {
  const [state, setState] = useState(DEFAULT_STATE);
  const [liveMode, setLiveMode] = useState(false);
  const [authed, setAuthed] = useState(false);
  const [me, setMe] = useState(null);
  const [bootError, setBootError] = useState(null);
  // In liveMode, the admin toolbar / toggle is ONLY shown when the user
  // arrived via the /admin/:token URL (adminUnlocked). Without the token
  // the user sees only the public app. In demo mode (no API_BASE) the
  // toolbar is always visible so design/dev still works.
  const adminAccessAllowed = !liveMode || adminUnlocked;

  // On boot in live mode, if refresh cookie is valid we'll be authed.
  // Fetch /me to hydrate role + mustChangePassword after page reload.
  useEffect(() => {
    if (!liveMode || !authed) return;
    (async () => {
      try { const m = await api.me(); setMe(m); } catch {}
    })();
  }, [liveMode, authed]);

  // Idle auto-logout — 30 min of no activity.
  useIdleLogout(async () => {
    if (!authed || !liveMode) return;
    try { await api.logout(); } catch {}
    setAuthed(false); setMe(null);
    if (typeof toast !== 'undefined') toast.warn('ออกจากระบบอัตโนมัติ — ไม่มีการใช้งาน 30 นาที');
  }, 30 * 60_000, liveMode && authed);

  useEffect(() => {
    (async () => {
      try {
        const boot = await loadInitialState();
        if (boot.live) { try { localStorage.removeItem('appState_v2'); } catch {} }
        skipNextSaveRef.current = true;
        setState(boot.state);
        latestStateRef.current = boot.state;
        setLiveMode(boot.live);
        setAuthed(boot.authed || false);
        // Surface the underlying error even when loadInitialState swallowed it.
        // Without this, a failing /api/config silently lands the user in demo
        // mode with no visible explanation.
        if (!boot.live && boot.error) setBootError(String(boot.error).slice(0, 200));
      } catch (e) {
        setBootError(String(e.message || 'boot_failed').slice(0, 200));
      }
    })();
  }, []);

  // ── Real-time user page: poll public config while tab is visible ──
  // Admin edits reflect within ~5-8s for anyone viewing the user page.
  // Stops when the tab is backgrounded to save battery.
  useEffect(() => {
    if (!liveMode) return;
    let cancelled = false;
    let lastVersion = '';

    const tick = async () => {
      if (cancelled || document.hidden) return;
      try {
        const cfg = await api.getConfig();
        const version = cfg.updatedAt ? String(cfg.updatedAt) : '';
        if (version && version === lastVersion) return;
        lastVersion = version;
        skipNextSaveRef.current = true;
        setState(prev => {
          const clean = SafeState.sanitize({ ...prev, ...cfg });
          latestStateRef.current = clean || prev;
          return clean || prev;
        });
      } catch {}
    };

    const id = setInterval(tick, 5000);
    const onVis = () => { if (!document.hidden) tick(); };
    document.addEventListener('visibilitychange', onVis);
    return () => { cancelled = true; clearInterval(id); document.removeEventListener('visibilitychange', onVis); };
  }, [liveMode]);

  // In demo mode, restore previous session from localStorage.
  useEffect(() => {
    if (liveMode) return;
    try {
      const saved = localStorage.getItem('appState_v2');
      if (saved) {
        const parsed = JSON.parse(saved);
        const clean = SafeState.sanitize(parsed);
        if (clean) setState(clean);
      }
    } catch {}
  }, [liveMode]);

  // In demo mode, persist. In live mode, the server is the truth.
  useEffect(() => {
    if (liveMode) return;
    try { localStorage.setItem('appState_v2', JSON.stringify(state)); } catch {}
  }, [state, liveMode]);

  const [view, setView] = useState(() => {
    // Admin arrived via /admin/:token URL → default them straight into the
    // admin console instead of the user preview.
    if (adminUnlocked) return 'admin';
    try { return localStorage.getItem('view') || TWEAKS.defaultView || 'user'; }
    catch { return TWEAKS.defaultView || 'user'; }
  });
  useEffect(() => { try { localStorage.setItem('view', view); } catch {} }, [view]);

  // Dual-view needs ~1280px horizontally. On narrower screens default to the
  // tab the user picked (defaultView) so they don't land on a blank-looking page.
  const [showBoth, setShowBoth] = useState(() => {
    // When the admin arrives via /admin/:token they want to work — not
    // look at the user preview side-by-side — so dual-view is off.
    if (adminUnlocked) return false;
    if (typeof window === 'undefined') return !!TWEAKS.showAllScreens;
    const wide = window.innerWidth >= 1280;
    return !!TWEAKS.showAllScreens && wide;
  });

  const pageKey = useMemo(() =>
    state.theme + '-' + state.buttons.length + '-' + state.banners.length,
    [state.theme, state.buttons.length, state.banners.length]
  );

  useDocumentIdentity(state.appName, state.appIcon);

  // Debounced server save. Scheduling the timeout from inside a setState
  // updater worked for a while, but React 18 may run updaters twice in
  // StrictMode / concurrent rendering — and observation in production
  // showed zero PATCH requests reaching the server despite the admin
  // seeing "บันทึกไม่สำเร็จ" toasts. Moved the side effect OUT of
  // setState and keyed off refs + a useEffect that watches state. This
  // is the simplest shape that guarantees one save per settled change.
  const saveTimer = useRef(null);
  const latestStateRef = useRef(state);
  const skipNextSaveRef = useRef(false);

  const setStateAndPersist = React.useCallback((updater) => {
    setState(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      const clean = SafeState.sanitize(next) || prev;
      latestStateRef.current = clean;
      return clean;
    });
  }, []);

  // Any state change triggers a save, UNLESS the change came from the
  // server itself (polling, initial boot, login-success hydrate). Those
  // paths flip skipNextSaveRef so we don't round-trip fresh server data.
  useEffect(() => {
    if (!liveMode) return;
    if (skipNextSaveRef.current) { skipNextSaveRef.current = false; return; }
    // We only save when the admin is actually logged in. If authed is
    // false the user is viewing the public-admin fall-back (shouldn't
    // reach here, but defensive).
    if (!authed) return;

    if (typeof SavedStore !== 'undefined') SavedStore.setStatus('dirty');
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      const snapshot = latestStateRef.current;
      if (typeof SavedStore !== 'undefined') SavedStore.setStatus('saving');
      try {
        await api.patchConfig(snapshot);
        if (typeof SavedStore !== 'undefined') SavedStore.setStatus('saved');
      } catch (err) {
        if (typeof SavedStore !== 'undefined') SavedStore.setStatus('error');
        const msg = (err && err.message) || 'unknown';
        try { console.error('[save] PATCH /api/admin/config failed:', msg, err?.responseBody); } catch {}
        if (err?.status === 401 || msg === 'unauthorized' || msg === 'no_refresh' || msg === 'invalid_refresh') {
          setAuthed(false);
          try { await api.logout(); } catch {}
          if (typeof toast !== 'undefined') toast.error('เซสชันหมดอายุ — กรุณาเข้าสู่ระบบใหม่');
        } else if (msg === 'invalid_input' && err.responseBody?.issues?.length) {
          // Surface zod validation failures so the admin (or me, reading
          // DevTools) can see WHICH field was rejected — otherwise
          // "บันทึกไม่สำเร็จ: invalid_input" is unactionable. Happened
          // when configBody schema lagged behind client state.
          const fields = err.responseBody.issues.map(i => i.path || '?').join(', ');
          if (typeof toast !== 'undefined') toast.error('บันทึกไม่สำเร็จ — ฟิลด์ไม่ถูกต้อง: ' + fields);
        } else {
          if (typeof toast !== 'undefined') toast.error('บันทึกไม่สำเร็จ: ' + msg);
        }
      }
    }, 600);
    return () => clearTimeout(saveTimer.current);
  }, [state, liveMode, authed]);

  // Keep `me` in sync when tokens refresh or role changes
  const refreshMe = React.useCallback(async () => {
    try { const m = await api.me(); setMe(m); } catch {}
  }, []);

  // Tweaks panel — only trust messages from the parent frame, and only
  // when we're actually embedded (not running standalone).
  const [tweakOpen, setTweakOpen] = useState(false);
  const parentOrigin = useRef(null);
  useEffect(() => {
    if (window === window.parent) return;  // standalone — nothing to do
    const handler = (e) => {
      if (e.source !== window.parent) return;
      if (!e.data || typeof e.data !== 'object') return;
      // Pin the editor's origin on the first trusted message we see.
      if (!parentOrigin.current) parentOrigin.current = e.origin;
      else if (e.origin !== parentOrigin.current) return;
      if (e.data.type === '__activate_edit_mode') setTweakOpen(true);
      if (e.data.type === '__deactivate_edit_mode') setTweakOpen(false);
    };
    window.addEventListener('message', handler);
    // Initial handshake: we don't know the editor origin yet, so use '*' ONCE.
    // The payload carries no secrets.
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch {}
    return () => window.removeEventListener('message', handler);
  }, []);

  const setTweak = (patch) => {
    if (window !== window.parent && parentOrigin.current) {
      try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, parentOrigin.current); } catch {}
    }
    if ('showAllScreens' in patch) setShowBoth(patch.showAllScreens);
  };

  const userView = (
    <div className="view" data-screen-label="User Home" style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
      <div className="caption">
        หน้าผู้ใช้ · User View
        {liveMode && <span style={{ color: '#06C755', marginLeft: 6 }}>● LIVE</span>}
      </div>
      <IOSDevice width={382} height={790}>
        <UserApp
          state={state}
          pageKey={pageKey}
          onButtonPress={(b) => { if (liveMode) api.trackClick(b.id, b.label); }}
        />
      </IOSDevice>
    </div>
  );

  const adminView = (
    <div className="view" data-screen-label="Admin Panel" style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
      <div className="caption">
        หน้าแอดมิน · Admin Console
        {liveMode && !authed && <span style={{ color: '#B4463A', marginLeft: 6 }}>● ต้องเข้าสู่ระบบ</span>}
        {liveMode && authed && <span style={{ color: '#06C755', marginLeft: 6 }}>● AUTHED</span>}
      </div>
      <ChromeWindow
        tabs={[{ title: SafeText.truncate(state.appName, 40) + ' — Admin' }]}
        activeIndex={0}
        url={`admin.${SafeText.slug(state.appName)}.app/console`}
        width={800} height={790}
      >
        {liveMode && !authed ? (
          <AuthGate onSuccess={async (user) => {
            setAuthed(true);
            if (user) setMe(user);
            try {
              const cfg = await api.getAdminConfig();
              skipNextSaveRef.current = true;
              setState(s => {
                const merged = SafeState.sanitize({ ...s, ...cfg }) || s;
                latestStateRef.current = merged;
                return merged;
              });
            } catch {}
          }} />
        ) : (
          <AdminShell
            state={state}
            setState={setStateAndPersist}
            liveMode={liveMode}
            authed={authed}
            me={me}
            onPasswordChanged={() => setMe(m => m ? { ...m, mustChangePassword: false } : m)}
            onMeRefresh={refreshMe}
            onLogout={async () => { try { await api.logout(); } catch {} setAuthed(false); setMe(null); }}
            onPreview={() => { setShowBoth(false); setView('user'); }}
          />
        )}
      </ChromeWindow>
    </div>
  );

  return (
    <div className="stage">
      <div className="header-copy">
        <h1>แอปหน้าบ้าน & หลังบ้าน</h1>
        <p>หน้าผู้ใช้มีปุ่มเมนู 1–12 ปุ่ม ปุ่มติดต่อแอดมิน และแบนเนอร์ที่หมุนอัตโนมัติ · แอดมินแก้ไขในแผงควบคุม แล้วอัปเดตแบบเรียลไทม์</p>
        {bootError && (
          <div style={{
            margin: '12px auto 0', maxWidth: 560,
            padding: '10px 14px', borderRadius: 9,
            background: 'rgba(180,70,58,0.08)', border: '1px solid rgba(180,70,58,0.3)',
            color: '#B4463A', fontSize: 12, lineHeight: 1.55, textAlign: 'left',
          }}>
            <strong>⚠ เชื่อมต่อเซิร์ฟเวอร์ไม่สำเร็จ — กำลังใช้โหมด demo</strong><br/>
            <code style={{ fontSize: 11, opacity: 0.85 }}>{bootError}</code><br/>
            <span style={{ fontSize: 11, opacity: 0.75 }}>เปิด DevTools (F12) → Console เพื่อดูรายละเอียด</span>
          </div>
        )}
      </div>

      {adminAccessAllowed ? (
        <div className="toolbar" role="tablist">
          <button
            className={!showBoth && view === 'user' ? 'active' : ''}
            onClick={() => { setShowBoth(false); setView('user'); setTweak({ showAllScreens: false, defaultView: 'user' }); }}>
            <span style={{ fontSize: 14 }}>📱</span> หน้าผู้ใช้
          </button>
          <button
            className={!showBoth && view === 'admin' ? 'active' : ''}
            onClick={() => { setShowBoth(false); setView('admin'); setTweak({ showAllScreens: false, defaultView: 'admin' }); }}>
            <span style={{ fontSize: 14 }}>🖥</span> หลังบ้าน
          </button>
          <button
            className={showBoth ? 'active' : ''}
            onClick={() => { setShowBoth(true); setTweak({ showAllScreens: true }); }}>
            <span style={{ fontSize: 14 }}>⇌</span> ทั้งสองหน้า
          </button>
        </div>
      ) : null}

      <div className="views" key={adminAccessAllowed ? (showBoth ? 'both' : view) : 'user'}>
        {adminAccessAllowed
          ? (showBoth ? (<>{userView}{adminView}</>) : (view === 'user' ? userView : adminView))
          : userView /* liveMode without admin token — no admin surface exposed */}
      </div>

      {liveMode && typeof ConsentBanner === 'function' && <ConsentBanner/>}

      <div className={'tweaks ' + (tweakOpen ? 'show' : '')}>
        <h4>Tweaks</h4>
        <label>ธีมสี</label>
        <select value={state.theme} onChange={e => setStateAndPersist(s => ({ ...s, theme: SafeText.pickTheme(e.target.value) }))}>
          {Object.keys(THEMES).map(k => <option key={k} value={k}>{k}</option>)}
        </select>
        <label>มุมมอง</label>
        <select
          value={showBoth ? 'both' : view}
          onChange={e => {
            const v = e.target.value;
            if (v === 'both') { setShowBoth(true); setTweak({ showAllScreens: true }); }
            else { setShowBoth(false); setView(v); setTweak({ showAllScreens: false, defaultView: v }); }
          }}>
          <option value="user">หน้าผู้ใช้</option>
          <option value="admin">หลังบ้าน</option>
          <option value="both">ทั้งสองหน้า</option>
        </select>
        <label>จำนวนปุ่มเมนู: {state.buttons.length}</label>
        <input type="range" min="1" max={MAX_BUTTONS} value={state.buttons.length}
          onChange={e => {
            const n = Math.min(MAX_BUTTONS, Math.max(1, Number(e.target.value) || 1));
            setStateAndPersist(s => {
              const arr = [...s.buttons];
              const pool = ['sparkle','heart','gift','calendar','camera','music'];
              while (arr.length < n) arr.push({
                id: 'g' + Math.random().toString(36).slice(2,7),
                label: 'ปุ่มใหม่', sub: '', icon: pool[arr.length % pool.length], url: '',
              });
              while (arr.length > n) arr.pop();
              return { ...s, buttons: arr };
            });
          }}/>
        <button onClick={async () => {
            if (typeof toast !== 'undefined') {
              const ok = await toast.confirm('รีเซ็ตข้อมูล demo ทั้งหมด?', 'รีเซ็ต', 'ยกเลิก', { tone: 'danger' });
              if (!ok) return;
            } else if (!window.confirm('รีเซ็ตข้อมูล demo ทั้งหมด?')) return;
            try { localStorage.removeItem('appState_v2'); } catch {}
            setState(DEFAULT_STATE);
          }}
          style={{ width: '100%', padding: '7px', borderRadius: 7, border: '1px solid rgba(0,0,0,0.1)', background: '#FBFAF7', fontFamily: 'inherit', fontSize: 12, cursor: 'pointer' }}>
          รีเซ็ตข้อมูลทั้งหมด
        </button>
      </div>
    </div>
  );
}

// Routing:
//   /install/:token  → InstallPage (public, token-gated)
//   /admin           → App (full admin console with side-by-side preview)
//   /admin/:token    → same as /admin (token kept for backward compat, ignored)
//   /?preview=1      → App (designer preview — dual view available)
//   everything else  → UserOnlyPage (fullscreen user app, no admin chrome)
// The public URL deliberately has no trace of admin — no toolbar, no
// "เข้าหลังบ้าน" button, no dual-pane preview. Visitors see only the
// user-facing app as if it were a standalone mobile app.
function Root() {
  const path = (typeof location !== 'undefined' ? location.pathname : '/').replace(/\/+$/, '') || '/';
  const qs = (typeof location !== 'undefined' ? new URLSearchParams(location.search) : null);
  const installMode = /^\/(install|download)(\/|$)/.test(path) || (qs && qs.get('page') === 'install');

  // Capacitor WebView detection — when true, we are running inside the
  // installed APK/IPA, NOT in a desktop/mobile browser. In that case
  // the admin console must be unreachable no matter what path Capacitor
  // happens to load: no ?preview=1, no /admin, no /install. The APK is
  // exclusively an end-user surface.
  const inCapacitor = typeof window !== 'undefined' && (
    !!window.Capacitor ||
    /Capacitor|Ionic/i.test(navigator.userAgent || '') ||
    (location.hostname === 'localhost' && location.protocol === 'https:' && location.port === '')
  );

  const adminMode   = !inCapacitor && (/^\/admin(\/|$)/.test(path) || (qs && qs.get('admin')));
  const previewMode = !inCapacitor && qs && qs.get('preview') === '1';

  if (installMode && typeof InstallPage === 'function') {
    return (
      <ErrorBoundary>
        <InstallPage/>
        {typeof ToastContainer === 'function' && <ToastContainer/>}
        {typeof OnlineIndicator === 'function' && <OnlineIndicator/>}
      </ErrorBoundary>
    );
  }

  if (adminMode || previewMode) {
    return (
      <ErrorBoundary>
        <App adminUnlocked={!!adminMode} />
        {typeof ToastContainer === 'function' && <ToastContainer/>}
        {typeof OnlineIndicator === 'function' && <OnlineIndicator/>}
      </ErrorBoundary>
    );
  }

  return (
    <ErrorBoundary>
      <UserOnlyPage/>
      {typeof ToastContainer === 'function' && <ToastContainer/>}
      {typeof OnlineIndicator === 'function' && <OnlineIndicator/>}
    </ErrorBoundary>
  );
}

// UserOnlyPage — canonical public page.
// Renders UserApp full-viewport with no iPhone frame, no header, no toolbar.
//
// Startup strategy (removes the "flash of default demo content" the user
// reported):
//   1. Synchronously read the last known server config from localStorage
//      key "public_cache_v1" and use IT as the initial state. No flash of
//      the hardcoded placeholder sample content.
//   2. If there is no cache yet (truly first launch), render a minimal
//      splash instead of UserApp — empty canvas with just the app's
//      background colour. Swaps to real content as soon as fetch lands.
//   3. When fetch completes, write the fresh config back to localStorage
//      so the NEXT launch is instant.
function UserOnlyPage() {
  const [state, setState] = useState(() => {
    try {
      const cached = localStorage.getItem('public_cache_v1');
      if (cached) {
        const parsed = JSON.parse(cached);
        const clean = SafeState.sanitize(parsed);
        if (clean) return clean;
      }
    } catch {}
    return DEFAULT_STATE;
  });
  const [liveMode, setLiveMode] = useState(false);
  const [hydrated, setHydrated] = useState(() => {
    try { return !!localStorage.getItem('public_cache_v1'); } catch { return false; }
  });

  useEffect(() => {
    (async () => {
      try {
        const boot = await loadInitialState();
        setState(boot.state);
        setLiveMode(boot.live);
        setHydrated(true);
        if (boot.live && boot.state) {
          try { localStorage.setItem('public_cache_v1', JSON.stringify(boot.state)); } catch {}
        }
      } catch {
        setHydrated(true);
      }
    })();
  }, []);

  // Live polling — admin edits land within ~3s. Cache is refreshed on
  // every successful tick so the warm-boot state stays current.
  useEffect(() => {
    if (!liveMode) return;
    let cancelled = false, lastVer = '';
    const tick = async () => {
      if (cancelled || document.hidden) return;
      try {
        const cfg = await api.getConfig();
        const ver = cfg.updatedAt ? String(cfg.updatedAt) : '';
        if (ver && ver === lastVer) return;
        lastVer = ver;
        setState(prev => {
          const merged = SafeState.sanitize({ ...prev, ...cfg }) || prev;
          try { localStorage.setItem('public_cache_v1', JSON.stringify(merged)); } catch {}
          return merged;
        });
      } catch {}
    };
    tick();  // fire once immediately so the warm-boot state reconciles
    const id = setInterval(tick, 3000);
    const onVis = () => { if (!document.hidden) tick(); };
    document.addEventListener('visibilitychange', onVis);
    return () => { cancelled = true; clearInterval(id); document.removeEventListener('visibilitychange', onVis); };
  }, [liveMode]);

  useDocumentIdentity(state.appName, state.appIcon);

  const pageKey = useMemo(
    () => state.theme + '-' + state.buttons.length + '-' + state.banners.length,
    [state.theme, state.buttons.length, state.banners.length]
  );

  const bg = (THEMES[state.theme] || THEMES.cream).bg;

  // Truly-first launch (no cache, no fetch yet) → render premium splash.
  // Once hydrated becomes true the splash fades out while UserApp is
  // already mounted behind it, so there's no visible jump.
  return (
    <div style={{ minHeight: '100vh', width: '100%', background: bg }}>
      {hydrated && (
        <>
          <UserApp
            state={state}
            pageKey={pageKey}
            fullscreen={true}
            onButtonPress={(b) => { if (liveMode) api.trackClick(b.id, b.label); }}
          />
          {liveMode && typeof ConsentBanner === 'function' && <ConsentBanner/>}
        </>
      )}
      {!hydrated && <FirstLaunchSplash appName={state.appName} appIcon={state.appIcon}/>}
    </div>
  );
}

// Premium splash — only shown on the FIRST-EVER app open on a device
// (public_cache_v1 empty). Three layered effects:
//   • conic-gradient backdrop that slowly rotates
//   • icon tile that pops in with a spring + expanding halo ring
//   • three staggered loading dots
// Swaps to UserApp when hydrated, so the animation runs for exactly
// as long as the backend fetch takes (usually 200-600ms).
function FirstLaunchSplash({ appName, appIcon }) {
  const letter = ((appName || 'A').trim().slice(0, 1) || 'A').toUpperCase();
  const iconSrc = (appIcon && typeof absolutizeMedia === 'function') ? absolutizeMedia(appIcon) : appIcon;
  return (
    <div className="splash-root">
      <div className="splash-bg"/>
      <div className="splash-icon">
        {iconSrc
          ? <img src={iconSrc} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover', borderRadius: 26 }}/>
          : letter}
      </div>
      <div className="splash-dots"><span/><span/><span/></div>
    </div>
  );
}

// Reflects admin-edited appName / appIcon in <title>, favicon, apple-touch-icon.
// Falls back to sensible defaults when either field is empty.
// absolutizeMedia() prepends API_BASE for relative /media/* URLs so the
// APK (WebView origin = https://localhost) loads icons from the real
// backend, not from the empty local bundle.
function useDocumentIdentity(appName, appIcon) {
  useEffect(() => {
    if (appName) document.title = appName;
    const fav = document.getElementById('__favicon');
    const ati = document.getElementById('__appletouchicon');
    const raw = appIcon || 'icon.svg';
    const src = (typeof absolutizeMedia === 'function') ? absolutizeMedia(raw) : raw;
    if (fav && fav.getAttribute('href') !== src) fav.setAttribute('href', src);
    if (ati && ati.getAttribute('href') !== src) ati.setAttribute('href', src);
  }, [appName, appIcon]);
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
