name: Android APK Build

on:
  push:
    branches: [main]
    paths:
      - '**/*.jsx'
      - '**/*.html'
      - 'manifest.webmanifest'
      - 'sw.js'
      - 'mobile/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:
    inputs:
      api_base:
        description: 'API base URL to bake into the APK'
        required: true
        default: 'https://api.your-domain.example.com'

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.18'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor deps
        working-directory: mobile
        run: |
          npm install
          npx cap add android || true

      - name: Prepare web assets with API_BASE
        working-directory: mobile
        env:
          API_BASE: ${{ github.event.inputs.api_base || 'https://api.your-domain.example.com' }}
        run: node scripts/prepare-web.js

      - name: Sync Capacitor
        working-directory: mobile
        run: npx cap sync android

      - name: Build debug APK
        working-directory: mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build release APK (unsigned)
        if: github.event_name == 'workflow_dispatch'
        working-directory: mobile/android
        run: ./gradlew assembleRelease || true

      - name: Upload release APK
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: ignore
