name: Nightly MongoDB Backup

on:
  schedule:
    - cron: '0 18 * * *'   # 18:00 UTC = 01:00 ICT (Thailand) daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install mongo tools
        run: |
          sudo wget -qO /etc/apt/trusted.gpg.d/mongodb.asc https://www.mongodb.org/static/pgp/server-7.0.asc
          echo "deb [arch=amd64] https://repo.mongodb.org/apt/ubuntu $(lsb_release -cs)/mongodb-org/7.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb.list
          sudo apt-get update -y
          sudo apt-get install -y mongodb-database-tools
      - name: Run backup
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
          BACKUP_BUCKET: ${{ secrets.BACKUP_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          chmod +x ops/backup.sh
          ops/backup.sh
